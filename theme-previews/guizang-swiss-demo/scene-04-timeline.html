<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>guizang swiss - 04 timeline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');
* { box-sizing: border-box; }
:root {
  --paper: #fafaf8;
  --ink: #0a0a0a;
  --grey-1: #f0f0ee;
  --grey-2: #d4d4d2;
  --grey-3: #737373;
  --accent: #002fa7;
  --accent-on: #ffffff;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --sans: "Inter", "Noto Sans SC", "Microsoft YaHei UI", sans-serif;
}
html, body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}
.composition {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: #000;
}
.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: var(--ink);
  color: #ffffff;
  font-family: var(--sans);
}
.content {
  position: absolute;
  inset: 0;
  padding: 72px;
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 34px;
}
.meta {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 17px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,.32);
}
.title {
  margin: 0;
  font-size: 76px;
  line-height: 1.06;
  font-weight: 200;
  max-width: 820px;
}
.timeline {
  position: relative;
  align-self: center;
  display: grid;
  gap: 30px;
}
.axis {
  position: absolute;
  top: 36px;
  bottom: 36px;
  left: 126px;
  width: 2px;
  background: rgba(255,255,255,.32);
}
.node {
  position: relative;
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 52px;
  min-height: 140px;
}
.year {
  font-family: var(--mono);
  font-size: 22px;
  color: var(--accent);
}
.dot {
  position: absolute;
  top: 4px;
  left: 116px;
  width: 22px;
  height: 22px;
  background: var(--accent);
}
.body {
  border-top: 1px solid rgba(255,255,255,.32);
  padding-top: 18px;
}
.body h2 {
  margin: 0 0 10px;
  font-size: 42px;
  line-height: 1.12;
  font-weight: 300;
}
.body p {
  margin: 0;
  font-size: 23px;
  line-height: 1.45;
  color: rgba(255,255,255,.72);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="guizang-swiss-04" data-width="1080" data-height="1440" data-start="0" data-duration="5">
  <div class="scene">
    <main class="content">
      <div class="meta"><span>VERTICAL TIMELINE</span><span>04 / 05</span></div>
      <h1 class="title">时间线需要固定轴线</h1>
      <section class="timeline">
        <div class="axis"></div>
        <div class="node"><div class="year">STEP 1</div><div class="dot"></div><div class="body"><h2>拆分口播</h2><p>每段口播对应一个 scene，避免后期对不齐。</p></div></div>
        <div class="node"><div class="year">STEP 2</div><div class="dot"></div><div class="body"><h2>匹配版式</h2><p>用标题、数据、对比、流程等结构服务语义。</p></div></div>
        <div class="node"><div class="year">STEP 3</div><div class="dot"></div><div class="body"><h2>渲染检查</h2><p>检查尺寸、动效、透明层和高风险 CSS。</p></div></div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".meta", { opacity: 0, y: -18 }, { opacity: 1, y: 0, duration: 0.38, ease: "power2.out" }, 0.18)
      .fromTo(".title", { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 0.52, ease: "power2.out" }, 0.42)
      .fromTo(".axis", { scaleY: 0, transformOrigin: "top" }, { scaleY: 1, duration: 0.7, ease: "power2.out" }, 0.76)
      .fromTo(".node", { opacity: 0, x: 32 }, { opacity: 1, x: 0, duration: 0.42, stagger: 0.14, ease: "power2.out" }, 0.88);
    window.__timelines = window.__timelines || {};
    window.__timelines["guizang-swiss-04"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
