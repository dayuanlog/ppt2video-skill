<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>guizang swiss - 01 cover</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap');
* { box-sizing: border-box; }
:root {
  --paper: #fafaf8;
  --ink: #0a0a0a;
  --grey-1: #f0f0ee;
  --grey-2: #d4d4d2;
  --grey-3: #737373;
  --accent: #002fa7;
  --accent-on: #ffffff;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --sans: "Inter", "Noto Sans SC", "Microsoft YaHei UI", sans-serif;
}
html, body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}
.composition {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: #000;
}
.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: var(--accent);
  color: var(--accent-on);
  font-family: var(--sans);
}
.grid {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(255,255,255,.16) 1px, transparent 1px),
    linear-gradient(180deg, rgba(255,255,255,.16) 1px, transparent 1px);
  background-size: 90px 90px;
}
.content {
  position: absolute;
  inset: 0;
  padding: 72px;
  display: grid;
  grid-template-rows: auto 1fr auto;
}
.meta {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 24px;
  border-bottom: 1px solid rgba(255,255,255,.5);
  padding-bottom: 20px;
  font-family: var(--mono);
  font-size: 17px;
  line-height: 1.3;
}
.hero {
  align-self: center;
}
.index {
  font-family: var(--mono);
  font-size: 28px;
  margin-bottom: 42px;
}
.headline {
  margin: 0;
  max-width: 880px;
  font-size: 116px;
  line-height: 1.02;
  font-weight: 200;
}
.headline strong {
  font-weight: 600;
}
.bottom {
  display: grid;
  grid-template-columns: 1.2fr .8fr;
  gap: 36px;
  border-top: 1px solid rgba(255,255,255,.5);
  padding-top: 24px;
  font-size: 28px;
  line-height: 1.35;
}
.bottom small {
  display: block;
  font-family: var(--mono);
  font-size: 17px;
  margin-bottom: 12px;
}
</style>
</head>
<body>
<div class="composition" data-composition-id="guizang-swiss-01" data-width="1080" data-height="1440" data-start="0" data-duration="4">
  <div class="scene">
    <div class="grid"></div>
    <main class="content">
      <div class="meta">
        <span>SWISS STYLE</span>
        <span>VERTICAL<br>VIDEO SAFE</span>
        <span>01 / 05</span>
      </div>
      <section class="hero">
        <div class="index">S01</div>
        <h1 class="headline">把瑞士风做成<strong>竖屏视频</strong></h1>
      </section>
      <section class="bottom">
        <div><small>RULE</small>单一锚点色、直角、网格、极大字号。</div>
        <div><small>NO WEBGL</small>不用循环点阵背景，避免导出不稳定。</div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".meta", { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.42, ease: "power2.out" }, 0.18)
      .fromTo(".index", { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 0.36, ease: "power2.out" }, 0.42)
      .fromTo(".headline", { opacity: 0, y: 54 }, { opacity: 1, y: 0, duration: 0.72, ease: "power3.out" }, 0.58)
      .fromTo(".bottom", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.46, ease: "power2.out" }, 1.1);
    window.__timelines = window.__timelines || {};
    window.__timelines["guizang-swiss-01"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
