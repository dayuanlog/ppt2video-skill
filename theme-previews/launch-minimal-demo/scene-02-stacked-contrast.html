<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>launch minimal - 02 stacked contrast</title>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #060606;
  --fg: #f5f5f2;
  --muted: rgba(245, 245, 242, 0.64);
  --line: rgba(245, 245, 242, 0.16);
  --accent: #6aa7ff;
  --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", sans-serif;
}

html,
body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}

.composition,
.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
}

.scene {
  background:
    radial-gradient(circle at 50% 16%, rgba(255, 255, 255, 0.05), transparent 24%),
    var(--bg);
  color: var(--fg);
  font-family: var(--sans);
}

.content {
  position: absolute;
  inset: 0;
  padding: 88px 92px 120px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 56px;
}

.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--muted);
  font-size: 28px;
}

.stack {
  align-self: center;
  display: grid;
  gap: 34px;
}

.panel {
  display: grid;
  gap: 18px;
}

.tag {
  color: var(--muted);
  font-size: 30px;
}

.big {
  margin: 0;
  font-size: 136px;
  line-height: 0.92;
  font-weight: 600;
}

.divider {
  width: 100%;
  height: 2px;
  background: var(--line);
}

.accent {
  color: var(--accent);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="launch-minimal-02" data-width="1080" data-height="1440" data-start="0" data-duration="4">
  <div class="scene">
    <main class="content">
      <div class="meta">
        <span>发布会极简 / Contrast</span>
        <span>02 / 05</span>
      </div>

      <section class="stack">
        <div class="panel">
          <div class="tag">AI 会生成</div>
          <h1 class="big">先做出来</h1>
        </div>
        <div class="divider"></div>
        <div class="panel">
          <div class="tag">真正难的</div>
          <h1 class="big">是 <span class="accent">修改</span></h1>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".meta", { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.22, ease: "power2.out" }, 0.08)
      .fromTo(".panel:first-of-type", { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.32, ease: "power3.out" }, 0.28)
      .fromTo(".divider", { opacity: 0, scaleX: 0 }, { opacity: 1, scaleX: 1, duration: 0.18, ease: "power2.out" }, 0.58)
      .fromTo(".panel:last-of-type", { opacity: 0, y: 26 }, { opacity: 1, y: 0, duration: 0.32, ease: "power3.out" }, 0.78);

    window.__timelines = window.__timelines || {};
    window.__timelines["launch-minimal-02"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
