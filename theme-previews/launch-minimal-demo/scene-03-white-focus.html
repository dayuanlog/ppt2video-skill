<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>launch minimal - 03 white focus</title>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #f7f7f3;
  --fg: #090909;
  --muted: rgba(9, 9, 9, 0.52);
  --line: rgba(9, 9, 9, 0.14);
  --accent: #2d6cdf;
  --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", sans-serif;
}

html,
body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}

.composition,
.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
}

.scene {
  background:
    radial-gradient(circle at 50% 18%, rgba(0, 0, 0, 0.04), transparent 22%),
    var(--bg);
  color: var(--fg);
  font-family: var(--sans);
}

.content {
  position: absolute;
  inset: 0;
  padding: 88px 92px 120px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 56px;
}

.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--muted);
  font-size: 28px;
}

.focus {
  align-self: center;
  display: grid;
  gap: 26px;
}

.label {
  color: var(--muted);
  font-size: 30px;
}

.word {
  margin: 0;
  font-size: 210px;
  line-height: 0.9;
  font-weight: 700;
  letter-spacing: 0;
}

.word .accent {
  color: var(--accent);
}

.sub {
  max-width: 500px;
  font-size: 38px;
  line-height: 1.24;
  color: rgba(9, 9, 9, 0.72);
}

.rule {
  width: 140px;
  height: 2px;
  background: var(--line);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="launch-minimal-03" data-width="1080" data-height="1440" data-start="0" data-duration="4">
  <div class="scene">
    <main class="content">
      <div class="meta">
        <span>发布会极简 / White Focus</span>
        <span>03 / 05</span>
      </div>

      <section class="focus">
        <div class="label">中场转折页</div>
        <h1 class="word"><span class="accent">可控</span></h1>
        <div class="rule"></div>
        <div class="sub">不是更花，而是更能改。</div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".meta", { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.22, ease: "power2.out" }, 0.08)
      .fromTo(".label", { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.18, ease: "power2.out" }, 0.24)
      .fromTo(".word", { opacity: 0, y: 26, scale: 0.98 }, { opacity: 1, y: 0, scale: 1, duration: 0.42, ease: "power3.out" }, 0.38)
      .fromTo(".rule", { opacity: 0, scaleX: 0 }, { opacity: 1, scaleX: 1, duration: 0.16, ease: "power2.out" }, 0.78)
      .fromTo(".sub", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.22, ease: "power2.out" }, 0.92);

    window.__timelines = window.__timelines || {};
    window.__timelines["launch-minimal-03"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
