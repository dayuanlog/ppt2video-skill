<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>launch minimal - 04 minimal sequence</title>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #050505;
  --fg: #f5f5f2;
  --muted: rgba(245, 245, 242, 0.62);
  --line: rgba(245, 245, 242, 0.16);
  --accent: #6aa7ff;
  --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", sans-serif;
}

html,
body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}

.composition,
.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
}

.scene {
  background:
    radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.05), transparent 22%),
    var(--bg);
  color: var(--fg);
  font-family: var(--sans);
}

.content {
  position: absolute;
  inset: 0;
  padding: 88px 92px 120px;
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 42px;
}

.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--muted);
  font-size: 28px;
}

.title {
  margin: 0;
  max-width: 720px;
  font-size: 128px;
  line-height: 1.2;
  font-weight: 600;
}

.steps {
  align-self: center;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 28px;
}

.step {
  padding-top: 18px;
  border-top: 2px solid var(--line);
}

.no {
  color: var(--muted);
  font-size: 26px;
}

.word {
  margin-top: 14px;
  font-size: 56px;
  font-weight: 600;
  line-height: 1;
}

.copy {
  margin-top: 16px;
  max-width: 220px;
  color: var(--muted);
  font-size: 28px;
  line-height: 1.24;
}

.step:last-child .word {
  color: var(--accent);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="launch-minimal-04" data-width="1080" data-height="1440" data-start="0" data-duration="4.5">
  <div class="scene">
    <main class="content">
      <div class="meta">
        <span>发布会极简 / Sequence</span>
        <span>04 / 05</span>
      </div>

      <h1 class="title">流程也能<br>只用文字</h1>

      <section class="steps">
        <div class="step">
          <div class="no">01</div>
          <div class="word">生成</div>
          <div class="copy">先得到一个基础版本。</div>
        </div>
        <div class="step">
          <div class="no">02</div>
          <div class="word">修改</div>
          <div class="copy">只动真正要改的部分。</div>
        </div>
        <div class="step">
          <div class="no">03</div>
          <div class="word">发布</div>
          <div class="copy">最后才进入成片阶段。</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".meta", { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.22, ease: "power2.out" }, 0.08)
      .fromTo(".title", { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 0.42, ease: "power3.out" }, 0.28)
      .fromTo(".step", { opacity: 0, y: 22 }, { opacity: 1, y: 0, duration: 0.24, stagger: 0.1, ease: "power2.out" }, 0.72);

    window.__timelines = window.__timelines || {};
    window.__timelines["launch-minimal-04"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
