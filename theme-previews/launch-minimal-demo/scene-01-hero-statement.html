<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>launch minimal - 01 hero statement</title>
<style>
* { box-sizing: border-box; }

:root {
  --bg: #050505;
  --fg: #f5f5f2;
  --muted: rgba(245, 245, 242, 0.66);
  --line: rgba(245, 245, 242, 0.18);
  --accent: #6aa7ff;
  --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei UI", sans-serif;
}

html,
body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}

.composition,
.scene {
  position: relative;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
}

.scene {
  background:
    radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.06), transparent 28%),
    linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent 22%),
    var(--bg);
  color: var(--fg);
  font-family: var(--sans);
}

.content {
  position: absolute;
  inset: 0;
  padding: 88px 92px 120px;
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 44px;
}

.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--muted);
  font-size: 28px;
  letter-spacing: 0;
}

.hero {
  align-self: center;
  display: grid;
  gap: 30px;
}

.kicker {
  width: fit-content;
  min-height: 54px;
  padding: 8px 18px 10px;
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 999px;
  color: var(--muted);
  font-size: 28px;
}

.title {
  margin: 0;
  max-width: 860px;
  font-size: 154px;
  line-height: 0.94;
  font-weight: 600;
  letter-spacing: 0;
}

.accent {
  color: var(--accent);
}

.sub {
  max-width: 520px;
  color: var(--muted);
  font-size: 34px;
  line-height: 1.28;
}

.rule {
  width: 168px;
  height: 3px;
  background: rgba(255, 255, 255, 0.24);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="launch-minimal-01" data-width="1080" data-height="1440" data-start="0" data-duration="4">
  <div class="scene">
    <main class="content">
      <div class="meta">
        <span>发布会极简 / Hero</span>
        <span>01 / 05</span>
      </div>

      <section class="hero">
        <div class="kicker">大结论页</div>
        <h1 class="title">这条视频<br>由 <span class="accent">AI</span> 完成</h1>
        <div class="rule"></div>
        <div class="sub">一页只说一件事。大字，留白，稳定出场。</div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".meta", { opacity: 0, y: -18 }, { opacity: 1, y: 0, duration: 0.24, ease: "power2.out" }, 0.08)
      .fromTo(".kicker", { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.2, ease: "power2.out" }, 0.26)
      .fromTo(".title", { opacity: 0, y: 34 }, { opacity: 1, y: 0, duration: 0.52, ease: "power3.out" }, 0.4)
      .fromTo(".rule", { opacity: 0, scaleX: 0 }, { opacity: 1, scaleX: 1, duration: 0.22, ease: "power2.out" }, 0.82)
      .fromTo(".sub", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.24, ease: "power2.out" }, 0.96);

    window.__timelines = window.__timelines || {};
    window.__timelines["launch-minimal-01"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
