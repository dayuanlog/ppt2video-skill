<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>guizang magazine - 05 pipeline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700;900&display=swap');
* { box-sizing: border-box; }
:root {
  --ink: #0a1f3d;
  --paper: #f1f3f5;
  --paper-2: #e4e8ec;
  --accent: #c85d3a;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --serif: "Noto Serif SC", serif;
  --sans: "Noto Sans SC", sans-serif;
}
html, body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}
.composition {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: #000;
}
.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--sans);
}
.content {
  position: absolute;
  inset: 0;
  padding: 72px;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 34px;
}
.chrome {
  display: flex;
  justify-content: space-between;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(241, 243, 245, .26);
  font-family: var(--mono);
  font-size: 17px;
  color: rgba(241, 243, 245, .74);
}
.title {
  font-family: var(--serif);
  font-size: 76px;
  line-height: 1.12;
  font-weight: 900;
  margin: 0;
  max-width: 780px;
}
.pipeline {
  position: relative;
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  align-content: center;
}
.axis {
  position: absolute;
  top: 90px;
  bottom: 90px;
  left: 56px;
  width: 2px;
  background: rgba(241, 243, 245, .24);
}
.step {
  display: grid;
  grid-template-columns: 112px 1fr;
  gap: 28px;
  align-items: start;
  min-height: 142px;
  position: relative;
}
.num {
  width: 112px;
  height: 112px;
  display: grid;
  place-items: center;
  border: 2px solid var(--accent);
  background: var(--ink);
  font-family: var(--serif);
  font-size: 44px;
  font-weight: 900;
  color: var(--paper);
  z-index: 2;
}
.copy {
  border-top: 1px solid rgba(241, 243, 245, .24);
  padding-top: 20px;
}
.copy h2 {
  font-family: var(--serif);
  font-size: 42px;
  line-height: 1.18;
  margin: 0 0 10px;
}
.copy p {
  margin: 0;
  font-size: 22px;
  line-height: 1.55;
  color: rgba(241, 243, 245, .76);
}
.footer {
  border-top: 1px solid rgba(241, 243, 245, .24);
  padding-top: 22px;
  font-family: var(--mono);
  font-size: 17px;
  color: rgba(241, 243, 245, .68);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="guizang-magazine-05" data-width="1080" data-height="1440" data-start="0" data-duration="5">
  <div class="scene">
    <main class="content">
      <div class="chrome"><span>PIPELINE</span><span>05 / 05</span></div>
      <h1 class="title">流程页要看得出方向</h1>
      <section class="pipeline">
        <div class="axis"></div>
        <div class="step"><div class="num">01</div><div class="copy"><h2>输入文案</h2><p>先确定每一页对应哪一段口播。</p></div></div>
        <div class="step"><div class="num">02</div><div class="copy"><h2>选择骨架</h2><p>按语义选择封面、数据、图片或流程结构。</p></div></div>
        <div class="step"><div class="num">03</div><div class="copy"><h2>生成 scene</h2><p>每页独立 HTML，动画在单一 GSAP timeline 内。</p></div></div>
        <div class="step"><div class="num">04</div><div class="copy"><h2>导出视频</h2><p>避免循环 WebGL 和复杂滤镜，渲染更稳定。</p></div></div>
      </section>
      <div class="footer">从 guizang 的交互 pipeline 改成视频可寻轨的顺序入场。</div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".chrome", { opacity: 0, y: -18 }, { opacity: 1, y: 0, duration: 0.42, ease: "power2.out" }, 0.18)
      .fromTo(".title", { opacity: 0, y: 32 }, { opacity: 1, y: 0, duration: 0.58, ease: "power3.out" }, 0.42)
      .fromTo(".axis", { scaleY: 0, transformOrigin: "top" }, { scaleY: 1, duration: 0.8, ease: "power3.out" }, 0.76)
      .fromTo(".step", { opacity: 0, x: 34 }, { opacity: 1, x: 0, duration: 0.46, stagger: 0.16, ease: "power2.out" }, 0.86)
      .fromTo(".footer", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.38, ease: "power2.out" }, 1.74);
    window.__timelines = window.__timelines || {};
    window.__timelines["guizang-magazine-05"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
