<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>guizang magazine - 01 title card</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700;900&display=swap');

* { box-sizing: border-box; }

:root {
  --ink: #0a1f3d;
  --ink-2: #152a4a;
  --paper: #f1f3f5;
  --paper-2: #e4e8ec;
  --accent: #c85d3a;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --serif: "Noto Serif SC", serif;
  --sans: "Noto Sans SC", sans-serif;
}

html,
body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}

.composition {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: #000;
}

.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--sans);
}

.paper-grain {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(241, 243, 245, .05) 1px, transparent 1px),
    linear-gradient(180deg, rgba(241, 243, 245, .035) 1px, transparent 1px),
    linear-gradient(135deg, var(--ink), var(--ink-2));
  background-size: 72px 72px, 72px 72px, 100% 100%;
}

.contour {
  position: absolute;
  border: 1px solid rgba(241, 243, 245, .12);
  width: 760px;
  height: 760px;
  left: -180px;
  bottom: -130px;
}

.contour.two {
  width: 560px;
  height: 560px;
  left: -80px;
  bottom: -30px;
  border-color: rgba(200, 93, 58, .28);
}

.masthead {
  position: absolute;
  top: 72px;
  left: 72px;
  right: 72px;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  padding-bottom: 22px;
  border-bottom: 1px solid rgba(241, 243, 245, .32);
  font-family: var(--mono);
  font-size: 18px;
  line-height: 1.25;
}

.issue {
  color: rgba(241, 243, 245, .72);
}

.page {
  color: rgba(241, 243, 245, .62);
}

.content {
  position: absolute;
  inset: 0;
  padding: 230px 72px 96px;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

.kicker {
  font-family: var(--mono);
  font-size: 20px;
  color: var(--accent);
  margin-bottom: 34px;
}

.headline {
  font-family: var(--serif);
  font-size: 112px;
  line-height: 1.08;
  font-weight: 900;
  margin: 0;
  max-width: 850px;
}

.deck {
  max-width: 620px;
  align-self: end;
  font-size: 31px;
  line-height: 1.48;
  color: rgba(241, 243, 245, .88);
}

.bottom {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  border-top: 1px solid rgba(241, 243, 245, .24);
  padding-top: 28px;
  font-family: var(--mono);
  font-size: 17px;
  color: rgba(241, 243, 245, .7);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="guizang-magazine-01" data-width="1080" data-height="1440" data-start="0" data-duration="4">
  <div class="scene">
    <div class="paper-grain"></div>
    <div class="contour"></div>
    <div class="contour two"></div>

    <div class="masthead">
      <div class="issue">Magazine Template<br>Vertical Scene</div>
      <div class="page">01 / 05</div>
    </div>

    <main class="content">
      <section>
        <div class="kicker">电子杂志 × 电子墨水</div>
        <h1 class="headline">把观点做成一页封面</h1>
      </section>

      <p class="deck">保留 guizang 的衬线标题、期刊留白和纸墨质感，去掉 WebGL 与翻页交互，适合稳定导出成视频。</p>

      <div class="bottom">
        <span>STYLE A</span>
        <span>1080 × 1440</span>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".masthead", { opacity: 0, y: -24 }, { opacity: 1, y: 0, duration: 0.55, ease: "power2.out" }, 0.2)
      .fromTo(".kicker", { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.42, ease: "power2.out" }, 0.45)
      .fromTo(".headline", { opacity: 0, y: 56 }, { opacity: 1, y: 0, duration: 0.78, ease: "expo.out" }, 0.62)
      .fromTo(".deck", { opacity: 0, y: 34 }, { opacity: 1, y: 0, duration: 0.52, ease: "power3.out" }, 1.05)
      .fromTo(".bottom", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.42, ease: "power2.out" }, 1.28);

    window.__timelines = window.__timelines || {};
    window.__timelines["guizang-magazine-01"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
