<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>guizang magazine - 03 quote image</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;700;900&display=swap');
* { box-sizing: border-box; }
:root {
  --ink: #0a1f3d;
  --paper: #f1f3f5;
  --paper-2: #e4e8ec;
  --accent: #c85d3a;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --serif: "Noto Serif SC", serif;
  --sans: "Noto Sans SC", sans-serif;
}
html, body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}
.composition {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: #000;
}
.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
}
.content {
  position: absolute;
  inset: 0;
  padding: 76px 72px 78px;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 36px;
}
.chrome {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid rgba(10, 31, 61, .24);
  padding-bottom: 18px;
  font-family: var(--mono);
  font-size: 17px;
}
.main {
  display: grid;
  grid-template-columns: 420px 1fr;
  gap: 44px;
  align-items: center;
}
.quote {
  font-family: var(--serif);
  font-size: 58px;
  line-height: 1.22;
  font-weight: 900;
  margin: 0;
}
.quote:before {
  content: "";
  display: block;
  width: 78px;
  height: 5px;
  background: var(--accent);
  margin-bottom: 30px;
}
.lead {
  margin-top: 30px;
  font-size: 24px;
  line-height: 1.58;
  color: rgba(10, 31, 61, .76);
}
.image-frame {
  height: 790px;
  border: 1px solid rgba(10, 31, 61, .24);
  background:
    linear-gradient(135deg, rgba(10, 31, 61, .18), transparent 42%),
    linear-gradient(180deg, #d9dedf, #f7f3eb);
  position: relative;
  overflow: hidden;
}
.image-frame:before,
.image-frame:after {
  content: "";
  position: absolute;
  background: rgba(10, 31, 61, .82);
}
.image-frame:before {
  width: 70%;
  height: 2px;
  left: 15%;
  top: 42%;
}
.image-frame:after {
  width: 2px;
  height: 58%;
  left: 46%;
  top: 24%;
}
.caption {
  position: absolute;
  left: 28px;
  right: 28px;
  bottom: 28px;
  padding-top: 18px;
  border-top: 1px solid rgba(10, 31, 61, .22);
  font-family: var(--mono);
  font-size: 16px;
  line-height: 1.45;
  color: rgba(10, 31, 61, .76);
}
.footer {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
  border-top: 1px solid rgba(10, 31, 61, .22);
  padding-top: 24px;
  font-size: 20px;
  color: rgba(10, 31, 61, .7);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="guizang-magazine-03" data-width="1080" data-height="1440" data-start="0" data-duration="5">
  <div class="scene">
    <main class="content">
      <div class="chrome"><span>QUOTE + IMAGE</span><span>03 / 05</span></div>
      <section class="main">
        <div>
          <h1 class="quote">让图片成为证据，而不是装饰。</h1>
          <p class="lead">左侧承载观点，右侧保留固定比例的图像槽位。真实素材替换时只需要把占位背景换成图片。</p>
        </div>
        <figure class="image-frame">
          <figcaption class="caption">IMAGE SLOT · 4:3 / CONTAIN · SAFE FOR RENDER</figcaption>
        </figure>
      </section>
      <div class="footer"><span>适合案例、人物、产品截图</span><span>避免滚动网页式长文</span></div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".chrome", { opacity: 0, y: -18 }, { opacity: 1, y: 0, duration: 0.42, ease: "power2.out" }, 0.18)
      .fromTo(".quote", { opacity: 0, x: -36 }, { opacity: 1, x: 0, duration: 0.68, ease: "power3.out" }, 0.45)
      .fromTo(".lead", { opacity: 0, y: 28 }, { opacity: 1, y: 0, duration: 0.46, ease: "power2.out" }, 0.9)
      .fromTo(".image-frame", { opacity: 0, x: 42 }, { opacity: 1, x: 0, duration: 0.62, ease: "power3.out" }, 0.62)
      .fromTo(".caption", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.38, ease: "power2.out" }, 1.1)
      .fromTo(".footer", { opacity: 0, y: 18 }, { opacity: 1, y: 0, duration: 0.38, ease: "power2.out" }, 1.3);
    window.__timelines = window.__timelines || {};
    window.__timelines["guizang-magazine-03"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
