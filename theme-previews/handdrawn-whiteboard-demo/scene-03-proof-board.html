<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1440">
<title>handdrawn whiteboard - 03 proof board</title>
<style>
@font-face {
  font-family: "WhiteboardHand";
  src: url("https://mdpic.eryoude.com/2026/202605142223177.ttf") format("truetype");
  font-display: swap;
}

* { box-sizing: border-box; }

:root {
  --paper: #fcfbf7;
  --ink: #111111;
  --soft: #434343;
  --marker: #1d6ed1;
  --marker-soft: #dce8fb;
  --line: rgba(17, 17, 17, 0.9);
  --shadow: rgba(17, 17, 17, 0.08);
  --hand: "WhiteboardHand", "Microsoft YaHei UI", sans-serif;
}

html,
body {
  margin: 0;
  width: 1080px;
  height: 1440px;
  overflow: hidden;
  background: #000;
}

.composition,
.scene {
  width: 1080px;
  height: 1440px;
  position: relative;
  overflow: hidden;
}

.scene {
  background:
    radial-gradient(circle at 18% 12%, rgba(29, 110, 209, 0.06), transparent 18%),
    radial-gradient(circle at 82% 86%, rgba(29, 110, 209, 0.05), transparent 18%),
    linear-gradient(180deg, rgba(0, 0, 0, 0.015), rgba(0, 0, 0, 0.008)),
    var(--paper);
  color: var(--ink);
  font-family: var(--hand);
}

.paper-noise {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(transparent 95%, rgba(0, 0, 0, 0.018) 95%),
    linear-gradient(90deg, transparent 95%, rgba(0, 0, 0, 0.014) 95%);
  background-size: 34px 34px, 34px 34px;
  opacity: 0.34;
}

.rule {
  position: absolute;
  left: 80px;
  right: 80px;
  height: 4px;
  background: linear-gradient(90deg, transparent, rgba(17, 17, 17, 0.92) 8%, rgba(17, 17, 17, 0.82) 48%, rgba(17, 17, 17, 0.92) 92%, transparent);
}

.rule.top { top: 126px; transform: rotate(-0.35deg); }

.content {
  position: absolute;
  inset: 0;
  padding: 78px 80px 110px;
  display: grid;
  grid-template-rows: auto auto 1fr;
  gap: 32px;
}

.meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 27px;
  color: var(--soft);
}

.title {
  margin: 80px 0 0;
  max-width: 720px;
  font-size: 110px;
  line-height: 0.96;
  font-weight: 400;
}

.board {
  align-self: center;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 24px;
  align-items: stretch;
}

.stack {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}

.tile,
.note {
  position: relative;
  background: rgba(255, 255, 255, 0.74);
  box-shadow: 0 10px 28px var(--shadow);
}

.tile {
  min-height: 260px;
  padding: 20px 22px;
}

.tile::before,
.note::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 5px solid var(--line);
  border-radius: 18px 12px 16px 18px;
  transform: rotate(-0.5deg);
}

.tile-head,
.tile-copy,
.stamp {
  position: relative;
}

.tile-head {
  display: grid;
  gap: 10px;
  font-size: 40px;
}

.tag {
  width: fit-content;
  min-height: 52px;
  padding: 8px 16px;
  border-radius: 999px;
  background: var(--marker-soft);
  color: var(--marker);
  box-shadow: inset 0 0 0 2px rgba(29, 110, 209, 0.16);
  font-size: 28px;
  line-height: 1;
}

.tile-copy {
  margin-top: 18px;
  max-width: 190px;
  font-size: 28px;
  line-height: 1.22;
  color: var(--soft);
}

.note {
  display: grid;
  place-items: center;
  padding: 28px;
}

.stamp {
  width: 206px;
  height: 206px;
  border: 6px solid var(--marker);
  border-radius: 50%;
  color: var(--marker);
  display: grid;
  place-items: center;
  text-align: center;
  font-size: 48px;
  line-height: 1.02;
  transform: rotate(-8deg);
}
</style>
</head>
<body>
<div class="composition" data-composition-id="whiteboard-demo-03" data-width="1080" data-height="1440" data-start="0" data-duration="4.5">
  <div class="scene">
    <div class="paper-noise"></div>
    <div class="rule top"></div>
    <main class="content">
      <div class="meta">
        <span>白板手绘 / 证据板</span>
        <span>03 / 05</span>
      </div>

      <h1 class="title">一条片子<br>三层证据</h1>

      <section class="board">
        <div class="stack">
          <div class="tile">
            <div class="tile-head"><span>画面</span><span class="tag">PPT</span></div>
            <div class="tile-copy">先有结构。</div>
          </div>
          <div class="tile">
            <div class="tile-head"><span>声音</span><span class="tag">VOICE</span></div>
            <div class="tile-copy">再进配音。</div>
          </div>
          <div class="tile">
            <div class="tile-head"><span>成片</span><span class="tag">VIDEO</span></div>
            <div class="tile-copy">最后能发布。</div>
          </div>
        </div>

        <div class="note">
          <div class="stamp">REAL<br>CASE</div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
  (function() {
    if (typeof gsap === "undefined") return;
    var tl = gsap.timeline({ paused: true });
    tl.fromTo(".meta", { opacity: 0, y: -16 }, { opacity: 1, y: 0, duration: 0.24, ease: "power2.out" }, 0.08)
      .fromTo(".title", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.42, ease: "power3.out" }, 0.28)
      .fromTo(".tile", { opacity: 0, y: 20, rotation: -1.6 }, { opacity: 1, y: 0, rotation: 0, duration: 0.26, stagger: 0.1, ease: "power2.out" }, 0.64)
      .fromTo(".note", { opacity: 0, scale: 0.96 }, { opacity: 1, scale: 1, duration: 0.3, ease: "power2.out" }, 0.96);

    window.__timelines = window.__timelines || {};
    window.__timelines["whiteboard-demo-03"] = tl;
    window.addEventListener("hyperframes:play", function() { tl.play(); });
    window.addEventListener("hyperframes:pause", function() { tl.pause(); });
    window.addEventListener("hyperframes:reset", function() { tl.restart().pause(); });
    setTimeout(function() { if (tl.paused()) tl.play(); }, 200);
  })();
  </script>
</div>
</body>
</html>
